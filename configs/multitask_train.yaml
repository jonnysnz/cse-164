scheduler: cosine
hflip_prob: 0.5
color_jitter: 0.2
crop_scale_min: 0.8
num_workers: 2
seed: 164
device: auto
max_train_samples: null
max_classification_samples: null
max_val_samples: null
log_interval: 25
overwrite_output: false
resume: null
