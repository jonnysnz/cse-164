adam_beta1: 0.9
adam_beta2: 0.95
gradient_clipping: true
gradient_clip_norm: 1.0
mixed_precision: auto
background_loss_weight: 0.05
dice_weight: 0.5
classification_weight: 0.1
scheduler: cosine
hflip_prob: 0.5
color_jitter: 0.2
crop_scale_min: 0.8
num_workers: 0
seed: 164
device: auto
max_train_samples: 4
max_classification_samples: 4
max_val_samples: 2
log_interval: 1
overwrite_output: false
resume: null
