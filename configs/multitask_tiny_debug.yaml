data_root: data
output_dir: outputs/multitask_tiny_debug_warmup
model_type: multitask_unet
epochs: 1
batch_size: 2
image_size: 64
base_channels: 8
classification_dropout: 0.2
learning_rate: 0.001
min_learning_rate: 0.00001
warmup_steps: 1
